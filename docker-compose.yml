services:
  chatarr:
    # Build from source (default for a cloned repo):
    build: .
    image: chatarr:latest
    # --- OR use the prebuilt image instead of building ---
    # comment out `build: .` above and use:
    # image: ghcr.io/liquidguru/chatarr:latest
    container_name: chatarr
    restart: unless-stopped
    env_file:
      - .env
    # Only needed if FRONTENDS includes "web". Format is HOST:CONTAINER.
    # The app listens on 8080 INSIDE the container — to change the port you reach
    # it on, edit the LEFT number only (e.g. "9970:8080"). Don't change WEB_PORT.
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
